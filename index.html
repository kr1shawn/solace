<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace | Official Portal</title>
    <style>
        :root {
            --theme-green: #5FB39F;
            --soft-white: #F8FBFB;
            --text-grey: #667772;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--soft-white);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(95, 179, 159, 0.05) 0%, transparent 20%),
                url('https://www.transparenttextures.com/patterns/notebook.png'); /* 笔记本纹理背景 */
            color: var(--text-grey);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 500px;
            width: 85%;
            background: rgba(255, 255, 255, 0.8);
            padding: 50px 40px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(95, 179, 159, 0.1);
            text-align: center;
            border: 1px solid rgba(95, 179, 159, 0.2);
        }

        /* 模拟一支笔在写东西的装饰 */
        .pen-icon {
            font-size: 40px;
            margin-bottom: 20px;
            display: inline-block;
            transform: rotate(-10deg);
        }

        h1 { color: var(--theme-green); font-weight: 300; margin-bottom: 10px; }
        .tagline { font-size: 0.9em; margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 20px; }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            background: #fff;
            border: 2px solid var(--theme-green);
            border-radius: 15px;
            text-decoration: none;
            color: var(--theme-green);
            font-size: 0.85em;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--theme-green);
            color: #fff;
            transform: translateY(-3px);
        }

        .footer { margin-top: 40px; font-size: 0.75em; opacity: 0.6; }
    </style>
</head>
<body>

    <div class="container">
        <div class="pen-icon">✍️</div>
        <h1>Solace</h1>
        <p class="tagline">Personal Ledger • Privacy-Focused • Local Storage</p>

        <div class="nav-grid">
            <a href="LEGAL" class="btn">Legal Declaration</a>
            <a href="TOS" class="btn">Terms of Service</a>
            <a href="PRIVACY" class="btn">Privacy Policy</a>
            <a href="EULA" class="btn">User License (EULA)</a>
        </div>

        <div class="footer">
            <p>Solace Personal Ledger © 2026</p>
            <p>Contact: krishawn@foxmail.com</p>
        </div>
    </div>

</body>
</html>
