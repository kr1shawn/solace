<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solace | Official Portal</title>
    <style>
        :root {
            --bg-deep-green: #4A7D70; /* 一木风格深蓝绿色背景 */
            --card-white: #FFFFFF;
            --accent-green: #5FB39F;
            --text-color: #5D5D5D;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--bg-deep-green);
            background-image: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05) 0%, transparent 70%);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 480px;
            width: 85%;
            background: var(--card-white);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        .pen-icon {
            font-size: 45px;
            margin-bottom: 15px;
            display: inline-block;
            transform: rotate(-10deg);
        }

        h1 { color: var(--bg-deep-green); font-weight: 400; margin-bottom: 5px; letter-spacing: 1px; }
        .tagline { font-size: 0.85em; opacity: 0.6; margin-bottom: 40px; }

        .nav-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn {
            padding: 18px 10px;
            background: #F4F8F7;
            border: none;
            border-radius: 20px;
            text-decoration: none;
            color: var(--bg-deep-green);
            font-size: 0.85em;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: var(--accent-green);
            color: #fff;
            transform: translateY(-2px);
        }

        .footer { margin-top: 40px; font-size: 0.7em; color: #999; }
    </style>
</head>
<body>

    <div class="container">
        <div class="pen-icon">✍️</div>
        <h1>Solace</h1>
        <p class="tagline">Simply Record, Securely Store.</p>

        <div class="nav-grid">
            <a href="LEGAL" class="btn">Legal Declaration</a>
            <a href="TOS" class="btn">Terms of Service</a>
            <a href="PRIVACY" class="btn">Privacy Policy</a>
            <a href="EULA" class="btn">User License (EULA)</a>
        </div>

        <div class="footer">
            <p>Solace Personal Ledger © 2026</p>
            <p>Contact: krishawn@foxmail.com</p>
        </div>
    </div>

</body>
</html>
